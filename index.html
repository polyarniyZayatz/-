<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cluckin' Bell - Idle Clicker</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="game-container">
        <!-- Header -->
        <header class="header">
            <div class="logo-container">
                <svg class="logo" viewBox="0 0 200 200" width="80" height="80">
                    <!-- Cluckin Bell Logo - Chicken Bell -->
                    <circle cx="100" cy="100" r="95" fill="#FFD700" stroke="#8B0000" stroke-width="5"/>
                    <!-- Bell shape -->
                    <path d="M60 140 Q100 160 140 140 L130 80 Q100 60 70 80 Z" fill="#FF6B00" stroke="#8B0000" stroke-width="3"/>
                    <!-- Chicken head -->
                    <ellipse cx="100" cy="70" rx="30" ry="25" fill="#FF6B00" stroke="#8B0000" stroke-width="2"/>
                    <!-- Comb -->
                    <path d="M85 50 Q90 35 100 45 Q110 35 115 50" fill="#CC0000" stroke="#8B0000" stroke-width="1"/>
                    <!-- Beak -->
                    <path d="M95 75 L100 85 L105 75 Z" fill="#FFD700" stroke="#8B0000" stroke-width="1"/>
                    <!-- Eyes -->
                    <circle cx="90" cy="65" r="5" fill="white"/>
                    <circle cx="110" cy="65" r="5" fill="white"/>
                    <circle cx="91" cy="66" r="2" fill="black"/>
                    <circle cx="111" cy="66" r="2" fill="black"/>
                    <!-- Bell clapper -->
                    <circle cx="100" cy="145" r="8" fill="#8B0000"/>
                </svg>
                <div class="title-container">
                    <h1 class="title">CLUCKIN' BELL</h1>
                    <p class="subtitle">Taste the Cock!</p>
                </div>
            </div>
        </header>

        <!-- Main Game Area -->
        <main class="main-content">
            <!-- Left Panel - Stats -->
            <aside class="stats-panel">
                <div class="stat-box">
                    <span class="stat-label">$ НАЛИЧКА</span>
                    <span class="stat-value" id="money">0</span>
                </div>
                <div class="stat-box">
                    <span class="stat-label">$/СЕК</span>
                    <span class="stat-value" id="per-second">0</span>
                </div>
                <div class="stat-box">
                    <span class="stat-label">ВСЕГО ЗАРАБОТАНО</span>
                    <span class="stat-value" id="total-earned">0</span>
                </div>
                <div class="stat-box">
                    <span class="stat-label">КЛИКОВ</span>
                    <span class="stat-value" id="total-clicks">0</span>
                </div>
            </aside>

            <!-- Center - Click Area -->
            <section class="click-area">
                <div class="click-container">
                    <div class="chicken-button" id="chicken-button">
                        <svg viewBox="0 0 200 220" width="180" height="200">
                            <!-- Chicken Body -->
                            <ellipse cx="100" cy="140" rx="70" ry="60" fill="#FF8C00" stroke="#8B4513" stroke-width="3"/>
                            <!-- Wings -->
                            <ellipse cx="45" cy="130" rx="25" ry="40" fill="#FF7700" stroke="#8B4513" stroke-width="2"/>
                            <ellipse cx="155" cy="130" rx="25" ry="40" fill="#FF7700" stroke="#8B4513" stroke-width="2"/>
                            <!-- Chicken Head -->
                            <ellipse cx="100" cy="60" rx="40" ry="35" fill="#FF8C00" stroke="#8B4513" stroke-width="3"/>
                            <!-- Comb -->
                            <path d="M75 30 Q80 10 90 25 Q95 5 105 25 Q115 5 120 25 Q130 10 125 30" fill="#CC0000" stroke="#8B0000" stroke-width="2"/>
                            <!-- Wattle -->
                            <ellipse cx="100" cy="95" rx="8" ry="12" fill="#CC0000" stroke="#8B0000" stroke-width="1"/>
                            <!-- Beak -->
                            <path d="M85 70 L100 90 L115 70 Z" fill="#FFD700" stroke="#CC9900" stroke-width="2"/>
                            <!-- Eyes -->
                            <circle cx="80" cy="55" r="12" fill="white" stroke="#333" stroke-width="1"/>
                            <circle cx="120" cy="55" r="12" fill="white" stroke="#333" stroke-width="1"/>
                            <circle cx="82" cy="57" r="6" fill="black"/>
                            <circle cx="122" cy="57" r="6" fill="black"/>
                            <circle cx="84" cy="55" r="2" fill="white"/>
                            <circle cx="124" cy="55" r="2" fill="white"/>
                            <!-- Legs -->
                            <path d="M75 195 L75 215 M70 215 L80 215" stroke="#FFD700" stroke-width="4" fill="none"/>
                            <path d="M125 195 L125 215 M120 215 L130 215" stroke="#FFD700" stroke-width="4" fill="none"/>
                        </svg>
                        <div class="click-text">КЛИК!</div>
                    </div>
                    <div class="click-value">+$<span id="click-value">1</span> за клик</div>
                </div>
                
                <!-- Floating numbers container -->
                <div class="floating-numbers" id="floating-numbers"></div>
                
                <!-- Food items display -->
                <div class="food-display">
                    <div class="food-item burger">
                        <svg viewBox="0 0 60 50" width="50" height="40">
                            <!-- Bun top -->
                            <ellipse cx="30" cy="12" rx="25" ry="10" fill="#D2691E" stroke="#8B4513" stroke-width="2"/>
                            <!-- Sesame seeds -->
                            <ellipse cx="20" cy="8" rx="2" ry="1" fill="#FFFACD"/>
                            <ellipse cx="30" cy="6" rx="2" ry="1" fill="#FFFACD"/>
                            <ellipse cx="40" cy="9" rx="2" ry="1" fill="#FFFACD"/>
                            <!-- Lettuce -->
                            <path d="M5 20 Q15 16 25 20 Q35 16 45 20 Q55 16 55 22 L5 22 Z" fill="#32CD32" stroke="#228B22" stroke-width="1"/>
                            <!-- Patty -->
                            <rect x="8" y="22" width="44" height="10" rx="3" fill="#8B4513" stroke="#5D2906" stroke-width="1"/>
                            <!-- Cheese -->
                            <path d="M6 32 L54 32 L52 36 L8 36 Z" fill="#FFD700" stroke="#DAA520" stroke-width="1"/>
                            <!-- Bun bottom -->
                            <ellipse cx="30" cy="42" rx="25" ry="8" fill="#D2691E" stroke="#8B4513" stroke-width="2"/>
                        </svg>
                    </div>
                    <div class="food-item fries">
                        <svg viewBox="0 0 50 60" width="40" height="50">
                            <!-- Fries container -->
                            <path d="M10 25 L5 55 L45 55 L40 25 Z" fill="#CC0000" stroke="#8B0000" stroke-width="2"/>
                            <!-- Fries -->
                            <rect x="12" y="5" width="5" height="35" rx="2" fill="#FFD700" stroke="#DAA520" stroke-width="1"/>
                            <rect x="19" y="8" width="5" height="32" rx="2" fill="#FFD700" stroke="#DAA520" stroke-width="1"/>
                            <rect x="26" y="3" width="5" height="37" rx="2" fill="#FFD700" stroke="#DAA520" stroke-width="1"/>
                            <rect x="33" y="10" width="5" height="30" rx="2" fill="#FFD700" stroke="#DAA520" stroke-width="1"/>
                        </svg>
                    </div>
                    <div class="food-item drink">
                        <svg viewBox="0 0 50 70" width="40" height="55">
                            <!-- Cup -->
                            <path d="M10 15 L8 60 L42 60 L40 15 Z" fill="#CC0000" stroke="#8B0000" stroke-width="2"/>
                            <!-- Lid -->
                            <ellipse cx="25" cy="15" rx="17" ry="5" fill="#FFFFFF" stroke="#CCCCCC" stroke-width="1"/>
                            <!-- Straw -->
                            <rect x="30" y="0" width="4" height="45" fill="#FFFFFF" stroke="#CCCCCC" stroke-width="1"/>
                            <!-- Logo on cup -->
                            <text x="25" y="40" text-anchor="middle" fill="#FFD700" font-size="10" font-weight="bold">CB</text>
                        </svg>
                    </div>
                </div>
            </section>

            <!-- Right Panel - Upgrades -->
            <aside class="upgrades-panel">
                <h2 class="panel-title">УЛУЧШЕНИЯ</h2>
                <div class="upgrades-list" id="upgrades-list">
                    <!-- Upgrades will be generated by JS -->
                </div>
            </aside>
        </main>

        <!-- Bottom Panel - Achievements -->
        <footer class="footer">
            <div class="achievements-container">
                <h3 class="achievements-title">ДОСТИЖЕНИЯ</h3>
                <div class="achievements-list" id="achievements-list">
                    <!-- Achievements will be generated by JS -->
                </div>
            </div>
            <div class="footer-controls">
                <button class="control-btn" id="save-btn">💾 СОХРАНИТЬ</button>
                <button class="control-btn" id="reset-btn">🔄 СБРОС</button>
                <button class="control-btn" id="sound-btn">🔊 ЗВУК</button>
            </div>
        </footer>
    </div>

    <script src="game.js"></script>
</body>
</html>
